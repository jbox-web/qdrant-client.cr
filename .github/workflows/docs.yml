---
name: docs

on:
  push:
    branches:
      - master
    paths-ignore:
      - "**.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancelling in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

# Requires repo Settings → Pages → Source = "GitHub Actions" (a 404 on deploy
# means it isn't set). Re-running a failed run duplicates the github-pages
# artifact and fails with "Multiple artifacts" — trigger a fresh run instead.
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Git checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Setup mise
        uses: jdx/mise-action@v4
      - name: Install dependencies
        run: mise dev:deps
      - name: Generate API docs
        run: mise dev:docs
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
